  const val = e.target.value;
  if (val === '__new__') {
    const name = prompt('Board name:');
    if (!name) {
      e.target.value = state.currentBoard || '';
      return;
    }
    const color = prompt('Board color (hex, e.g. #4A90D9):', '#4A90D9') || '#4A90D9';
    try {
      const board = await api.post('/api/boards', { name, color });
      state.currentBoard = board.slug;
      await loadBoards();
      await populateFilterOptions();
      await refreshCurrentView();
    } catch (err) {
      alert('Failed to create board: ' + err.message);
      e.target.value = state.currentBoard || '';
    }
    return;
  }
  state.currentBoard = val;
  await populateFilterOptions();
  await refreshCurrentView();
});

// Filter changes
document.getElementById('filter-assignee').addEventListener('change', (e) => {
  state.filters.assignee = e.target.value;
  renderFilterChips();
  refreshCurrentView();
});
document.getElementById('filter-label').addEventListener('change', (e) => {
  state.filters.label = e.target.value;
  renderFilterChips();
  refreshCurrentView();
});
document.getElementById('filter-due').addEventListener('change', (e) => {
  state.filters.due = e.target.value;
  renderFilterChips();
  refreshCurrentView();
});

// New card button
// New Card Dialog
function openNewCardDialog(preBoard, preList) {
  const overlay = document.getElementById('new-card-overlay');
  const boardSel = document.getElementById('nc-board');
  const hasBoards = state.boards.length > 0;
  const selectedBoard = preBoard || state.currentBoard;
  boardSel.innerHTML = state.boards.map(b =>
    `<option value="${escHtml(b.slug)}"${b.slug === selectedBoard ? ' selected' : ''}>${escHtml(b.name)}</option>`
  ).join('') + '<option value="__new__"' + (!hasBoards ? ' selected' : '') + '>+ New Board...</option>';
  document.getElementById('nc-new-board-fields').style.display = hasBoards ? 'none' : 'block';
  document.getElementById('nc-title').value = '';
  document.getElementById('nc-board-name').value = '';
  if (preList) document.getElementById('nc-list').value = preList;
  overlay.classList.add('visible');
  setTimeout(() => document.getElementById(hasBoards ? 'nc-title' : 'nc-board-name').focus(), 50);
}

document.getElementById('nc-board').addEventListener('change', (e) => {
  document.getElementById('nc-new-board-fields').style.display =
    e.target.value === '__new__' ? 'block' : 'none';
});

document.getElementById('new-card-close').addEventListener('click', () => {
  document.getElementById('new-card-overlay').classList.remove('visible');
});
document.getElementById('new-card-overlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('new-card-overlay'))
    document.getElementById('new-card-overlay').classList.remove('visible');
});

document.getElementById('nc-submit').addEventListener('click', async () => {
  const title = document.getElementById('nc-title').value.trim();
  if (!title) { document.getElementById('nc-title').focus(); return; }
  let board = document.getElementById('nc-board').value;
  const list = document.getElementById('nc-list').value;

  if (board === '__new__') {
    const boardName = document.getElementById('nc-board-name').value.trim();
    if (!boardName) { document.getElementById('nc-board-name').focus(); return; }
    const color = document.getElementById('nc-board-color').value;
    try {
      const result = await api.post('/api/boards', { name: boardName, color });
      board = result.slug;
      state.currentBoard = board;
      await loadBoards();
    } catch (err) {
      alert('Failed to create board: ' + err.message);
      return;
    }
  }

  try {
    const created = await api.post(`/api/boards/${board}/lists/${list}/cards`, { title });
    state.currentBoard = board;
    document.getElementById('board-select').value = board;
    document.getElementById('new-card-overlay').classList.remove('visible');
    await populateFilterOptions();
    await refreshCurrentView();
    openCardModal(board, list, created.slug);
  } catch (err) {
    alert('Failed to create card: ' + err.message);
  }
});

document.getElementById('nc-title').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('nc-submit').click();
});

document.getElementById('btn-new-card').addEventListener('click', openNewCardDialog);

document.getElementById('btn-sync').addEventListener('click', async () => {
  const btn = document.getElementById('btn-sync');
  btn.classList.add('syncing');
  btn.textContent = '⟳ Syncing...';
  try {
    const result = await api.post('/api/sync/push');
    btn.classList.remove('syncing');
    if (result.status === 'ok') {
      btn.classList.add('sync-ok');
      btn.textContent = '✓ Synced';
    } else if (result.status === 'no-changes') {
      btn.classList.add('sync-ok');
      btn.textContent = '✓ Up to date';
    } else {
      btn.classList.add('sync-err');
      btn.textContent = '✗ ' + (result.message || 'Sync failed');
    }
  } catch (err) {
    btn.classList.remove('syncing');
    btn.classList.add('sync-err');
    btn.textContent = '✗ Sync failed';
  }
  setTimeout(() => {
    btn.classList.remove('sync-ok', 'sync-err');
    checkSyncStatus();
  }, 3000);
});

async function checkSyncStatus() {
  const btn = document.getElementById('btn-sync');
  if (btn.classList.contains('syncing') || btn.classList.contains('sync-ok') || btn.classList.contains('sync-err')) return;
  try {
    const result = await api.get('/api/sync/status');
    btn.classList.toggle('sync-dirty', result.dirty);
    btn.textContent = result.dirty ? '↻ Sync needed' : '↻ Sync';
  } catch { }
}
checkSyncStatus();
setInterval(checkSyncStatus, 10000);

/* ================================================================
   LLM Settings modal
   ================================================================ */
const cfgEls = {
  overlay: document.getElementById('settings-overlay'),
  token: document.getElementById('cfg-token'),
  baseUrl: document.getElementById('cfg-base-url'),
  model: document.getElementById('cfg-model'),
  tls: document.getElementById('cfg-tls-verify'),
  status: document.getElementById('cfg-status'),
};

async function openSettings() {
  const cfg = await api.get('/api/llm-config');
  cfgEls.token.value = '';
  cfgEls.token.placeholder = cfg.auth_token || 'paste token';
  cfgEls.baseUrl.value = cfg.base_url || '';
  cfgEls.model.value = cfg.model || 'claude-opus-4-7';
  cfgEls.tls.checked = !!cfg.tls_verify;
  cfgEls.status.textContent = '';
  cfgEls.overlay.classList.add('visible');
}

function closeSettings() {
  cfgEls.overlay.classList.remove('visible');
}

document.getElementById('btn-settings').addEventListener('click', openSettings);
document.getElementById('settings-close').addEventListener('click', closeSettings);
document.getElementById('btn-cfg-cancel').addEventListener('click', closeSettings);
cfgEls.overlay.addEventListener('click', (e) => {
  if (e.target === cfgEls.overlay) closeSettings();
});

document.getElementById('btn-cfg-save').addEventListener('click', async () => {
  const body = {
    base_url: cfgEls.baseUrl.value,
    model: cfgEls.model.value,
    tls_verify: cfgEls.tls.checked,
  };
  if (cfgEls.token.value) body.auth_token = cfgEls.token.value;
  try {
    await api.put('/api/llm-config', body);
    closeSettings();
    refreshNotesButtonState();
  } catch (err) {
    cfgEls.status.textContent = 'Save failed: ' + err.message;
  }
});

document.getElementById('btn-test-conn').addEventListener('click', async () => {
  cfgEls.status.textContent = 'Testing...';
  try {
    const body = await api.post('/api/llm-config/test');
    cfgEls.status.textContent = body.ok ? '✓ OK' : '✗ ' + (body.error || 'failed');
  } catch (err) {
    cfgEls.status.textContent = '✗ ' + err.message;
  }
});

async function refreshNotesButtonState() {
  const btn = document.getElementById('btn-process-notes');
  if (!btn) return;
  try {
    const cfg = await api.get('/api/llm-config');
    btn.disabled = !cfg.configured;
    btn.title = cfg.configured ? 'Process meeting notes' : 'Configure API token in Settings';
  } catch {
    btn.disabled = true;
  }
}

/* ================================================================
   Process Notes wizard
   ================================================================ */
let currentNoteId = null;
let currentOps = [];

function showNotesStep(n) {
  for (let i = 1; i <= 3; i++) {
    document.getElementById(`notes-step-${i}`).hidden = (i !== n);
  }
}

function closeNotesModal() {
  document.getElementById('notes-overlay').classList.remove('visible');
}

document.getElementById('btn-process-notes').addEventListener('click', () => {
  document.getElementById('notes-text').value = '';
  document.getElementById('notes-title').value = '';
  document.getElementById('notes-spinner').hidden = true;
  showNotesStep(1);
  document.getElementById('notes-overlay').classList.add('visible');
});

document.getElementById('notes-close').addEventListener('click', closeNotesModal);
document.getElementById('btn-notes-cancel').addEventListener('click', closeNotesModal);
document.getElementById('btn-notes-close').addEventListener('click', closeNotesModal);
document.getElementById('notes-overlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('notes-overlay')) closeNotesModal();
});

document.getElementById('btn-notes-analyze').addEventListener('click', async () => {
  const text = document.getElementById('notes-text').value.trim();
  if (!text) return;
  const title = document.getElementById('notes-title').value;
  document.getElementById('notes-spinner').hidden = false;
  try {
    const result = await api.post('/api/notes/analyze', { text, title });
    currentNoteId = result.note_id;
    currentOps = result.operations || [];
    document.getElementById('notes-summary').textContent =
      `Note: ${currentNoteId} — ${result.summary || ''}`;
    renderOps(currentOps);
    showNotesStep(2);
  } catch (err) {
    alert('Analyze failed: ' + err.message);
  } finally {
    document.getElementById('notes-spinner').hidden = true;
  }
});

function renderOps(ops) {
  const container = document.getElementById('notes-ops');
  container.innerHTML = '';
  if (!ops.length) {
    container.innerHTML = '<p style="color:#5e6c84;font-size:13px;">No operations proposed.</p>';
    return;
  }
  ops.forEach((op, i) => {
    const div = document.createElement('div');
    div.className = 'op-row';
    const checked = op.confidence !== 'low' ? 'checked' : '';
    const target = op.card
      ? `${op.board || ''} / ${op.list || ''} / ${op.card}`
      : `${op.board || ''} / ${op.list || ''}`;
    const summary = op.op === 'create_card' ? `"${escHtml(op.title || '')}"`
      : op.op === 'add_comment' ? `"${escHtml((op.text || '').slice(0, 80))}"`
      : op.op === 'tick_checklist' ? `tick "${escHtml(op.item || '')}"`
      : op.op === 'add_checklist_item' ? `add "${escHtml(op.item || '')}"`
      : op.op === 'move_card' ? `→ ${escHtml(op.target_list || '')}`
      : op.op === 'update_field' ? `${escHtml(op.field || '')} = ${escHtml(JSON.stringify(op.value))}`
      : '';
    div.innerHTML = `
      <label>
        <input type="checkbox" data-i="${i}" ${checked} />
        <strong>${escHtml(op.op || '')}</strong>
        <span class="conf conf-${op.confidence || 'med'}">${escHtml(op.confidence || '')}</span>
        <span class="target">${escHtml(target)}</span>
        <span class="summary">${summary}</span>
        <div class="reason">${escHtml(op.reason || '')}</div>
      </label>`;
    container.appendChild(div);
  });
}

document.getElementById('btn-notes-back').addEventListener('click', () => showNotesStep(1));

document.getElementById('btn-notes-apply').addEventListener('click', async () => {
  const checks = document.querySelectorAll('#notes-ops input[type=checkbox]');
  const selected = [];
  checks.forEach(c => { if (c.checked) selected.push(currentOps[parseInt(c.dataset.i)]); });
  let result;
  try {
    result = await api.post('/api/notes/apply', {
      note_id: currentNoteId,
      operations: selected,
    });
  } catch (err) {
    alert('Apply failed: ' + err.message);
    return;
  }
  const out = document.getElementById('notes-result');
  const skipped = result.skipped || [];
  const applied = result.applied || [];
  out.innerHTML = `
    <p>✓ Applied ${applied.length} operation(s).</p>
    ${skipped.length ? `<p>✗ Skipped ${skipped.length}:</p>
      <ul>${skipped.map(s => `<li>${escHtml(s.op && s.op.op || '')}: ${escHtml(s.reason || '')}</li>`).join('')}</ul>` : ''}
    <p>Note kept at <a href="/api/notes/${encodeURIComponent(currentNoteId)}" target="_blank">/api/notes/${escHtml(currentNoteId)}</a></p>
  `;
  document.getElementById('btn-notes-sync').hidden = applied.length === 0;
  document.getElementById('btn-notes-sync').disabled = false;
  document.getElementById('btn-notes-sync').textContent = 'Sync now';
  showNotesStep(3);
  if (typeof refreshCurrentView === 'function') refreshCurrentView();
});

document.getElementById('btn-notes-sync').addEventListener('click', async () => {
  const btn = document.getElementById('btn-notes-sync');
  btn.disabled = true;
  btn.textContent = 'Syncing…';
  try {
    await api.post('/api/sync/push');
    btn.textContent = 'Synced ✓';
  } catch (err) {
    btn.textContent = '✗ ' + err.message;
    btn.disabled = false;
  }
});

// Modal close
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

// Close board edit popovers on outside click
document.addEventListener('click', () => {
  document.querySelectorAll('.board-edit-popover.visible').forEach(p => p.classList.remove('visible'));
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  const tag = (e.target.tagName || '').toLowerCase();
  const isInput = tag === 'input' || tag === 'textarea' || tag === 'select';

  if (e.key === 'Escape') {
    if (document.getElementById('modal-overlay').classList.contains('visible')) {
      closeModal();
    } else if (document.getElementById('settings-overlay').classList.contains('visible')) {
      closeSettings();
    } else if (document.getElementById('notes-overlay') && document.getElementById('notes-overlay').classList.contains('visible')) {
      document.getElementById('notes-overlay').classList.remove('visible');
    } else if (searchDropdown.classList.contains('visible')) {
      searchDropdown.classList.remove('visible');
      searchInput.value = '';
      searchInput.blur();
    }
    return;
  }

  if (isInput) return;

  switch (e.key) {
    case '1': switchView('board'); break;
    case '2': switchView('dashboard'); break;
    case '3': switchView('calendar'); break;
    case '4': switchView('table'); break;
    case 'n':
    case 'N':
      document.getElementById('btn-new-card').click();
      break;
    case '/':
      e.preventDefault();
      searchInput.focus();
      break;
  }
});

/* ================================================================
   Init
   ================================================================ */
(async () => {
  await loadBoards();
  await populateFilterOptions();
  await refreshCurrentView();
  refreshNotesButtonState();
})();
</script>
